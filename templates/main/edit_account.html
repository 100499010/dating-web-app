{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="profile-card2">
        <div class="header2">
            <div class="name-container2">
                <div class="name2">Edit Account</div>
            </div>
        </div>
        <!-- Form to edit account -->
        <form action="{{ url_for('main.edit_account', user_id=user.user_id) }}" method="post" class="edit-form3">
            <div class="form-group3">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" class="form-control3" value="{{ user.email }}" required>
            </div>
            <div class="form-group3">
                <label for="user_name">Username:</label>
                <input type="text" name="user_name" id="user_name" class="form-control3" value="{{ user.user_name }}" required>
            </div>
            <div class="form-group3">
                <label for="user_name">Actual password:</label>
                <input type="password" name="password" id="password" class="form-control3" required>
            </div>
            <div class="form-group3">
                <label for="user_name">New password:</label>
                <input type="password" name="new_password" id="new_password" class="form-control3" required>
            </div>
            <div class="form-group3">
                <label for="user_name">Repeat new password:</label>
                <input type="password" name="new_password_rep" id="new_password_rep" class="form-control3" required>
            </div>
            <div class="edit-profile-container2" style="text-align: center; margin-top: 20px;">
                <button type="submit" class="edit-profile-button2">Save Changes</button>
            </div>
        </form>
        <!-- Return button -->
        <div class="edit-profile-container2" style="text-align: left; margin-top: 30px; margin-left: 50px;">
            <a href="{{ url_for('main.index') }}" class="edit-profile-button2">Return</a>
        </div>
    </div>
    
</div>
{% endblock %}
